<style>
:root{--ind:#4F46E5;--sky:#0EA5E9;--bg:#f5f6fa;--card:#fff;--muted:#6b7280;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:#111}
header{background:linear-gradient(135deg,var(--ind),var(--sky));color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 16px 16px;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:20px;display:flex;align-items:center;gap:8px}
.search{display:flex;gap:8px;margin-top:12px}
.search input{flex:1;border:0;border-radius:12px;padding:12px 14px;font-size:16px}
.search button{border:0;border-radius:12px;background:#fff;color:var(--ind);font-weight:700;padding:0 16px;font-size:16px}
.controls{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.chip{border:1px solid rgba(255,255,255,.6);color:#fff;border-radius:999px;padding:6px 12px;font-size:13px;background:transparent}
.chip.on{background:#fff;color:var(--ind);font-weight:700}
.toggle{margin-left:auto;font-size:13px;display:flex;align-items:center;gap:6px;color:#fff}
main{padding:14px;max-width:680px;margin:0 auto}
.status{color:var(--muted);text-align:center;padding:24px 8px;font-size:15px}
.card{background:var(--card);border-radius:14px;padding:12px;margin-bottom:12px;display:flex;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cover{width:54px;height:76px;border-radius:6px;object-fit:cover;background:#e5e7eb;flex:none}
.meta{flex:1;min-width:0}
.meta .t{font-weight:600;font-size:15px;line-height:1.25}
.meta .a{color:var(--muted);font-size:13px;margin:2px 0 6px}
.src{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.03em}
.dl{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.dl a{text-decoration:none;font-size:13px;font-weight:600;color:#fff;background:var(--ind);padding:7px 12px;border-radius:9px}
.dl a.alt{background:#10b981}
.dl .spin{font-size:12px;color:var(--muted)}
.foot{margin:18px 4px 30px;color:var(--muted);font-size:13px;line-height:1.5}
.foot a{color:var(--ind)}
.foot .links{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0}
.foot .links a{background:#eef2ff;padding:6px 10px;border-radius:8px;text-decoration:none}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:10px;padding:10px;font-size:12px;margin-top:10px}
</style>
</head>
<body>
<header>
  <h1><span>\U0001F4DA</span> Cerca Libri</h1>
  <form class="search" onsubmit="cerca();return false">
    <input id="q" type="search" placeholder="Titolo del libro" autocomplete="off" enterkeyhint="search">
    <button type="submit">Cerca</button>
  </form>
  <div class="controls">
    <button type="button" class="chip on" data-f="pdf" onclick="setFmt(this)">PDF</button>
    <button type="button" class="chip" data-f="epub" onclick="setFmt(this)">EPUB</button>
    <button type="button" class="chip" data-f="txt" onclick="setFmt(this)">TXT</button>
    <label class="toggle"><input type="checkbox" id="solo"> solo <span id="fmtlbl">PDF</span></label>
  </div>
</header>
<main>
  <div id="status" class="status">Scrivi un titolo e tocca <b>Cerca</b>.<br>Solo fonti legali e gratuite.</div>
  <div id="results"></div>
  <div id="footer" class="foot" style="display:none"></div>
</main>
<script>
var FMT="pdf";
function setFmt(b){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');FMT=b.dataset.f;document.getElementById('fmtlbl').textContent=FMT.toUpperCase();render();}
function norm(s){return (s||"").toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function jget(u){const r=await fetch(u);if(!r.ok)throw 0;return r.json();}

async function srcGutenberg(q){
  try{const d=await jget('https://gutendex.com/books?search='+encodeURIComponent(q));
  return (d.results||[]).slice(0,8).map(b=>{
    let f={},cover='';
    for(const[m,u]of Object.entries(b.formats||{})){
      if(u.endsWith('.zip'))continue;
      if(m.includes('image')&&!cover)cover=u;
      else if(m.includes('application/pdf'))f.pdf=u;
      else if(m.includes('epub'))f.epub=u;
      else if(m.startsWith('text/plain')&&!f.txt)f.txt=u;
    }
    if(!Object.keys(f).length)return null;
    return {titolo:b.title,autore:(b.authors&&b.authors[0]?b.authors[0].name:'Sconosciuto'),anno:'',fonte:'Project Gutenberg',cover,formati:f,pop:b.download_count||0};
  }).filter(Boolean);}catch(e){return[];}
}
async function srcArchive(q){
  try{const u='https://archive.org/advancedsearch.php?q='+encodeURIComponent('title:("'+q+'") AND mediatype:texts AND NOT access-restricted-item:true')+'&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=downloads&rows=8&output=json';
  const d=await jget(u);
  return (d.response.docs||[]).map(x=>{
    let cr=x.creator;if(Array.isArray(cr))cr=cr[0];
    return {titolo:x.title||x.identifier,autore:cr||'Sconosciuto',anno:x.year||'',fonte:'Internet Archive',cover:'https://archive.org/services/img/'+x.identifier,formati:{},pop:x.downloads||0,ia:x.identifier};
  });}catch(e){return[];}
}
async function srcOpenLibrary(q){
  try{const d=await jget('https://openlibrary.org/search.json?q='+encodeURIComponent(q)+'&limit=12&fields=title,author_name,first_publish_year,cover_i,ia,ebook_access');
  let out=[];
  for(const x of (d.docs||[])){
    if(x.ebook_access!=='public')continue;
    if(!x.ia||!x.ia.length)continue;
    out.push({titolo:x.title,autore:(x.author_name&&x.author_name[0])||'Sconosciuto',anno:x.first_publish_year||'',fonte:'Open Library',cover:x.cover_i?('https://covers.openlibrary.org/b/id/'+x.cover_i+'-M.jpg'):'',formati:{},pop:0,ia:x.ia[0]});
    if(out.length>=6)break;
  }
  return out;}catch(e){return[];}
}
async function resolveIA(id){
  try{const d=await jget('https://archive.org/metadata/'+id);let f={};
  for(const file of (d.files||[])){
    const n=file.name,l=n.toLowerCase();
    const url='https://archive.org/download/'+id+'/'+encodeURIComponent(n);
    if(l.endsWith('.pdf')&&!f.pdf)f.pdf=url;
    else if(l.endsWith('.epub')&&!f.epub)f.epub=url;
    else if(l.endsWith('_djvu.txt')&&!f.txt)f.txt=url;
  }return f;}catch(e){return {};}
}

var RESULTS=[];
function dedup(list){
  let seen={},order=[];
  for(const r of list){const k=norm(r.titolo)+'|'+norm(r.autore);
    if(seen[k]){const b=seen[k];for(const[f,u]of Object.entries(r.formati))if(!b.formati[f])b.formati[f]=u;if(!b.cover)b.cover=r.cover;b.pop=Math.max(b.pop,r.pop);if(!b.ia&&r.ia)b.ia=r.ia;}
    else{seen[k]=r;order.push(k);}}
  return order.map(k=>seen[k]);
}
function rank(list,q){const nq=norm(q);
  const rel=t=>t===nq?0:t.startsWith(nq)?1:t.includes(nq)?2:3;
  return list.sort((a,b)=>{const ra=rel(norm(a.titolo)),rb=rel(norm(b.titolo));return ra!==rb?ra-rb:b.pop-a.pop;});
}

async function cerca(){
  const q=document.getElementById('q').value.trim();if(!q)return;
  document.getElementById('q').blur();
  const st=document.getElementById('status');st.style.display='block';
  st.innerHTML='Cerco su Gutenberg, Internet Archive, Open Library…';
  document.getElementById('results').innerHTML='';document.getElementById('footer').style.display='none';
  let parts=await Promise.all([srcGutenberg(q),srcArchive(q),srcOpenLibrary(q)]);
  let all=rank(dedup([].concat(...parts)),q);
  // risolvi i file reali per Internet Archive / Open Library
  await Promise.all(all.filter(r=>r.ia).map(async r=>{const f=await resolveIA(r.ia);r.formati=Object.assign({},r.formati,f);}));
  all=all.filter(r=>Object.keys(r.formati).length);
  RESULTS=all;
  render();
  showFooter(q);
}

function render(){
  const box=document.getElementById('results');const st=document.getElementById('status');
  let list=RESULTS;
  if(document.getElementById('solo').checked)list=list.filter(r=>r.formati[FMT]);
  if(!RESULTS.length){return;}
  st.style.display='none';
  if(!list.length){box.innerHTML='<div class="status">Nessun risultato in '+FMT.toUpperCase()+'. Disattiva il filtro per vedere tutti i formati.</div>';return;}
  box.innerHTML=list.map(r=>{
    const fmts=Object.keys(r.formati).sort();
    const ordered=[FMT].concat(fmts.filter(f=>f!==FMT));
    const dl=ordered.filter(f=>r.formati[f]).map((f,i)=>'<a class="'+(i===0?'':'alt')+'" href="'+r.formati[f]+'" target="_blank" rel="noopener" download>'+f.toUpperCase()+'</a>').join('');
    const cover=r.cover?'<img class="cover" loading="lazy" src="'+esc(r.cover)+'" onerror="this.style.visibility=\'hidden\'">':'<div class="cover"></div>';
    return '<div class="card">'+cover+'<div class="meta"><div class="t">'+esc(r.titolo)+(r.anno?' <span class="src">('+esc(''+r.anno)+')</span>':'')+'</div><div class="a">'+esc(r.autore)+'</div><div class="src">'+esc(r.fonte)+'</div><div class="dl">'+dl+'</div></div></div>';
  }).join('');
}

function showFooter(q){
  const eq=encodeURIComponent(q);
  const f=document.getElementById('footer');
  f.style.display='block';
  f.innerHTML='<div class="note">⚠️ Solo libri di <b>pubblico dominio</b> o ad <b>accesso aperto</b>. Per i titoli recenti sotto copyright usa l\'acquisto o il prestito digitale legale.</div>'+
    '<div>Altre fonti legali (aprono nel browser):</div>'+
    '<div class="links">'+
      '<a target="_blank" rel="noopener" href="https://standardebooks.org/ebooks/?query='+eq+'">Standard Ebooks</a>'+
